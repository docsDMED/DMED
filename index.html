<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DMED.uz</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f5f5f5;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
}

.logo img {
  height: 35px;
}

/* LANGUAGE BUTTON */
.lang-wrapper {
  position: relative;
}

.lang-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: #eee;
  border-radius: 50px;
  padding: 8px 12px;
  font-size: 14px;
  cursor: pointer;
}

.lang-menu {
  position: absolute;
  right: 0;
  top: 45px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
  display: none;
  overflow: hidden;
}

.lang-menu div {
  padding: 10px 15px;
  cursor: pointer;
}

.lang-menu div:hover {
  background: #f0f0f0;
}

/* TITLE */
.title {
  text-align: center;
  font-size: 20px;
  font-weight: 600;
  margin-top: 40px;
  padding: 0 15px;
}

/* PIN */
.pin-container {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin: 30px 0;
}

.pin-container input {
  width: 55px;
  height: 65px;
  font-size: 26px;
  text-align: center;
  border-radius: 14px;
  border: 1px solid #ddd;
  outline: none;
}

/* BUTTON */
.btn {
  display: block;
  margin: auto;
  width: 90%;
  height: 55px;
  border-radius: 30px; /* yumaloq */
  border: none;
  background: #e0e0e0;
  color: #777;
  font-size: 18px;
}

/* IMAGE */
.info img {
  width: 95%;
  max-width: 420px;
  display: block;
  margin: 40px auto;
  border-radius: 15px;
}

/* DOCUMENT PAGE */
#docPage {
  display: none;
  text-align: center;
}

.doc img {
  width: 95%;
  max-width: 600px;
  margin-top: 20px;
}

.download {
  margin: 20px auto;
  padding: 15px;
  width: 70px;
  height: 70px;
  border: none;
  background: white;
  color: white;
  font-size: 28px;
  border-radius: 18px; /* qiyshiqroq / yumaloq */
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}
</style>

</head>

<body>

<!-- PIN PAGE -->
<div id="pinPage">

  <div class="header">
    <div class="logo">
      <img src="documents.png">
    </div>

    <!-- CUSTOM LANGUAGE -->
    <div class="lang-wrapper">
      <div class="lang-btn" onclick="toggleLang()">🌐 <span id="currentLang">RU</span></div>

      <div class="lang-menu" id="langMenu">
        <div onclick="setLang('ru')">🇷🇺 Russian</div>
        <div onclick="setLang('en')">🇺🇸 English</div>
        <div onclick="setLang('uz')">🇺🇿 Uzbek</div>
      </div>
    </div>

  </div>

  <div class="title" id="title">
    Введите PIN-код для просмотра документа
  </div>

  <div class="pin-container">
    <input type="text" maxlength="1">
    <input type="text" maxlength="1">
    <input type="text" maxlength="1">
    <input type="text" maxlength="1">
  </div>

  <button class="btn" onclick="checkPIN()" id="btn">Открыть</button>

  <div class="info">
    <img src="example.jpg">
  </div>

</div>

<!-- DOCUMENT PAGE -->
<div id="docPage">
  <div class="doc">
    <img id="docImg" src="changed_qr.jpg">
  </div>

  <button class="download" onclick="downloadPDF()">
  🖨️
</button>
</div>

<script>
const inputs = document.querySelectorAll(".pin-container input");

// AUTO NEXT
inputs.forEach((input, i) => {
  input.addEventListener("input", () => {
    if (input.value.length === 1 && i < inputs.length - 1) {
      inputs[i + 1].focus();
    }
  });
});

// PIN CHECK (5174)
function checkPIN() {
  let pin = "";
  inputs.forEach(i => pin += i.value);

  if (pin === "5174") {
    document.getElementById("pinPage").style.display = "none";
    document.getElementById("docPage").style.display = "block";
  } else {
    alert("Wrong PIN");
  }
}

// LANGUAGE MENU
function toggleLang() {
  const menu = document.getElementById("langMenu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function setLang(lang) {
  const title = document.getElementById("title");
  const btn = document.getElementById("btn");
  const current = document.getElementById("currentLang");

  if (lang === "ru") {
    title.innerText = "Введите PIN-код для просмотра документа";
    btn.innerText = "Открыть";
    current.innerText = "RU";
  }
  if (lang === "en") {
    title.innerText = "Enter PIN code to view document";
    btn.innerText = "Open";
    current.innerText = "EN";
  }
  if (lang === "uz") {
    title.innerText = "Hujjatni ko‘rish uchun PIN kodni kiriting";
    btn.innerText = "Ochish";
    current.innerText = "UZ";
  }

  document.getElementById("langMenu").style.display = "none";
}

// PDF
async function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();

  const img = document.getElementById("docImg");

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = img.naturalWidth;
  canvas.height = img.naturalHeight;

  ctx.drawImage(img, 0, 0);

  const imgData = canvas.toDataURL("image/jpeg");

  pdf.addImage(imgData, 'JPEG', 10, 10, 180, 250);
  pdf.save("DMED.pdf");
}
</script>

</body>
</html>
